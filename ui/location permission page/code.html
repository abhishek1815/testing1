<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Location Permission - QuickBite</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#303233",
                        "surface": "#fcf8ff",
                        "on-background": "#1a1a2e",
                        "surface-container": "#efecff",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fcf8ff",
                        "tertiary-container": "#999a9a",
                        "primary": "#ab3500",
                        "surface-tint": "#ab3500",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-primary-fixed-variant": "#832600",
                        "secondary": "#635d59",
                        "on-primary-fixed": "#390c00",
                        "inverse-on-surface": "#f2efff",
                        "on-surface-variant": "#594139",
                        "surface-container-high": "#e8e5ff",
                        "on-primary-container": "#5f1900",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#ffb59d",
                        "secondary-container": "#e7ded9",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#eae1dc",
                        "on-secondary-fixed": "#1f1b18",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-dim": "#dad7f3",
                        "tertiary": "#5d5f5f",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#454747",
                        "surface-variant": "#e2e0fc",
                        "inverse-surface": "#2f2e43",
                        "primary-container": "#ff6b35",
                        "primary-fixed": "#ffdbd0",
                        "on-secondary-container": "#68615e",
                        "error": "#ba1a1a",
                        "inverse-primary": "#ffb59d",
                        "outline-variant": "#e1bfb5",
                        "surface-container-highest": "#e2e0fc",
                        "on-secondary-fixed-variant": "#4b4642",
                        "surface-container-low": "#f5f2ff",
                        "on-error-container": "#93000a",
                        "background": "#fcf8ff",
                        "on-surface": "#1a1a2e",
                        "outline": "#8d7168",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "secondary-fixed-dim": "#cec5c0",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "unit": "8px",
                        "margin-mobile": "16px",
                        "container-max": "1200px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "h1-mobile": ["Poppins"],
                        "body-md": ["Poppins"],
                        "label-md": ["Poppins"],
                        "h3": ["Poppins"],
                        "h2": ["Poppins"],
                        "h1": ["Poppins"],
                        "body-lg": ["Poppins"],
                        "caption": ["Poppins"]
                    },
                    "fontSize": {
                        "h1-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "h3": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "h2": ["32px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "h1": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "caption": ["12px", { "lineHeight": "1.2", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Main Content Canvas (Navigation Suppressed for Onboarding/Transactional Intent) -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-12 md:py-24">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Large Map Pin Illustration Spot -->
<div class="w-32 h-32 md:w-40 md:h-40 bg-surface-container-high rounded-full flex items-center justify-center mb-8 shadow-[0_4px_20px_rgba(0,0,0,0.08)]">
<div class="w-24 h-24 md:w-28 md:h-28 bg-primary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-[64px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Header -->
<div class="text-center mb-10 w-full">
<h1 class="font-h2 text-h2 text-on-background mb-3">Where are you ordering from?</h1>
<p class="font-body-md text-body-md text-on-surface-variant px-4">
                    Set your location to discover the best culinary experiences and accurate delivery times near you.
                </p>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-4 px-6 rounded-full flex items-center justify-center gap-3 transition-colors duration-200 shadow-[0_4px_20px_rgba(0,0,0,0.08)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.12)] mb-8">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">my_location</span>
                Use My Current Location
            </button>
<!-- Divider -->
<div class="w-full flex items-center gap-4 mb-8">
<div class="flex-grow h-px bg-outline-variant opacity-60"></div>
<span class="font-caption text-caption text-on-surface-variant tracking-widest uppercase">Or</span>
<div class="flex-grow h-px bg-outline-variant opacity-60"></div>
</div>
<!-- Manual Entry / Search Bar -->
<div class="w-full relative mb-8">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full bg-surface-container-low border border-outline-variant focus:border-primary rounded-full py-4 pl-14 pr-6 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant outline-none transition-colors duration-200 shadow-sm" placeholder="Enter Location Manually" type="text"/>
</div>
<!-- Recent Locations -->
<div class="w-full flex flex-col gap-2">
<h3 class="font-label-md text-label-md text-secondary mb-2 px-2">Recent Locations</h3>
<button class="w-full flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors duration-200 text-left group">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-secondary">history</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface leading-tight">123 Culinary Avenue</p>
<p class="font-caption text-caption text-on-surface-variant mt-1">New York, NY 10001</p>
</div>
</button>
<button class="w-full flex items-center gap-4 p-4 rounded-xl hover:bg-surface-container-low transition-colors duration-200 text-left group">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-secondary">history</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-body-md text-on-surface leading-tight">456 Artisan Boulevard</p>
<p class="font-caption text-caption text-on-surface-variant mt-1">Brooklyn, NY 11211</p>
</div>
</button>
</div>
</div>
</main>
</body></html>
